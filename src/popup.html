<!doctype html>
<html lang="tr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Futbin Player Sync</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <main class="app-shell">
    <section class="player-list-panel">
      <div class="table-title">
        <div class="title-with-icon">
          <span class="title-icon"><svg viewBox="0 0 24 24" aria-hidden="true">
              <ellipse cx="12" cy="5" rx="8" ry="3" />
              <path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6" />
            </svg></span>
          <div><span class="eyebrow">OKUNAN VERİLER</span>
            <h2>Oyuncular</h2>
          </div>
        </div>
        <div class="list-tabs" role="group" aria-label="Liste Tipi">
          <button class="list-tab" type="button" data-list="coin-cards">Coin Cards</button>
          <button class="list-tab active" type="button" data-list="club-players">Club Players</button>
        </div>
        <span id="currentClub" class="scroll-hint">Kulüp bekleniyor</span>
      </div>
      <div class="player-list-scroll">
        <div id="records" class="player-list">
          <div class="empty">Henüz oyuncu verisi yok.</div>
        </div>
      </div>
    </section>

    <aside class="control-column">
      <header>
        <div class="header-main">
          <div class="title-with-icon">
            <span class="title-icon small"><svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3 4 7v5c0 5 3.4 8 8 9 4.6-1 8-4 8-9V7l-8-4Z" />
                <path d="m9 12 2 2 4-4" />
              </svg></span>
            <div><span class="eyebrow">FUTBIN SYNC</span>
              <h1>İşlem Seçimi</h1>
            </div>
          </div>
          <div class="header-tools">
            <div class="environment-switch" role="group" aria-label="Backend ortamı">
              <button class="environment-button active" type="button" aria-pressed="true"
                data-api-base-url="http://localhost:5055/api/"><svg class="button-icon" viewBox="0 0 24 24"
                  aria-hidden="true">
                  <circle cx="12" cy="12" r="8" />
                  <path d="M4 12h16M12 4a13 13 0 0 1 0 16M12 4a13 13 0 0 0 0 16" />
                </svg><span>Local</span></button>
              <button class="environment-button" type="button" aria-pressed="false"
                data-api-base-url="https://api.sbcmonster.com/api/"><svg class="button-icon" viewBox="0 0 24 24"
                  aria-hidden="true">
                  <path d="M5 8h14M5 12h14M5 16h14" />
                  <circle cx="7" cy="8" r="1" />
                  <circle cx="7" cy="12" r="1" />
                  <circle cx="7" cy="16" r="1" />
                </svg><span>Prod</span></button>
            </div>
            <span id="statusDot" class="dot"></span>
          </div>
        </div>
        <section class="controls">
          <div class="setting">
            <select id="waitMs" aria-label="Sayfalar arası bekleme">
              <option value="3000">3 saniye</option>
              <option value="5000" selected>5 saniye</option>
              <option value="10000">10 saniye</option>
              <option value="20000">20 saniye</option>
            </select>
          </div>
          <div class="actions sync-actions">
            <button id="resume" class="secondary"><svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 11a8 8 0 1 0-2.3 5.7" />
                <path d="M20 5v6h-6" />
              </svg><span>Resume</span></button>
            <button id="start" class="primary"><svg class="button-icon play-icon" viewBox="0 0 24 24"
                aria-hidden="true">
                <path d="m8 5 11 7-11 7V5Z" />
              </svg><span id="startLabel">Start</span></button>
            <button id="stop" class="danger" hidden><svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="6" y="6" width="12" height="12" rx="2" />
              </svg><span>Stop</span></button>
            <button id="clear" class="link"><svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13M10 11v5M14 11v5" />
              </svg><span>Clear</span></button>
          </div>
          <p id="error" class="error" hidden></p>
        </section>

        <div class="operation-tabs" role="group" aria-label="Çalışacak işlemler">
          <button class="operation-tab" type="button" aria-pressed="false" data-operation="coin-cards"><svg
              class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <ellipse cx="12" cy="6" rx="7" ry="3" />
              <path d="M5 6v5c0 1.7 3.1 3 7 3s7-1.3 7-3V6M5 11v5c0 1.7 3.1 3 7 3s7-1.3 7-3v-5" />
            </svg><span>Coin Cards</span></button>
          <button class="operation-tab active" type="button" aria-pressed="true" data-operation="club-players"><svg
              class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="9" cy="8" r="3" />
              <circle cx="17" cy="9" r="2" />
              <path d="M3 19c.5-4 2.5-6 6-6s5.5 2 6 6M15 14c3 0 4.5 1.7 5 5" />
            </svg><span>Club Players</span></button>
        </div>
      </header>

      <section class="monitor">
        <div class="monitor-head">
          <div><span class="eyebrow">CANLI DURUM</span><strong id="status">Hazır</strong></div>
        </div>
        <div class="progress"><span id="progressBar"></span></div>
        <div class="countdown-box">
          <span class="countdown-icon"><svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9" />
              <path d="M12 7v5l3 2" />
            </svg></span>
          <div><small>SONRAKİ ADIM / TEKRAR</small><b id="countdown">Bekliyor</b></div>
          <div class="run-count-wrap"><small>DÖNGÜ</small><b id="runCount">0</b></div>
        </div>
        <div class="stats sync-stats">
          <div><b id="clubCount">0 / 0</b><small>Club</small></div>
          <div><b id="pageCount">0 / 0</b><small>Page</small></div>
          <div><b id="recordCount">0</b><small>Read</small></div>
          <div><b id="insertedCount">0</b><small>INSERT</small></div>
          <div><b id="updatedCount">0</b><small>UPDATE</small></div>
          <div><b id="deletedCount">0</b><small>DELETE</small></div>
          <div><b id="skippedCount">0</b><small>Skip</small></div>
        </div>
        <div class="logs">
          <div class="logs-head"><span class="eyebrow">REQUEST URL LOGS</span><small id="logCount">0 kayıt</small></div>
          <div id="errorLogs" class="error-logs" hidden></div>
          <div id="logs" class="logs-list">
            <div class="logs-empty">Henüz request gönderilmedi.</div>
          </div>
        </div>
      </section>
    </aside>
  </main>
  <script src="popup.js"></script>
</body>

</html>
