<!doctype html>
<html lang="tr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SBC LatestPlayerSync</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body data-content="coin-cards" data-operations="coin-cards" data-title="Futbin Latest Coin Cards">
  <nav class="top-navbar" aria-label="Ana navigasyon">
    <div class="environment-switch" role="group" aria-label="Backend ortamı">
      <button class="environment-button active" type="button" aria-pressed="true"
        data-api-env="production"><svg class="button-icon" viewBox="0 0 24 24"
          aria-hidden="true">
          <path d="M5 8h14M5 12h14M5 16h14" />
          <circle cx="7" cy="8" r="1" />
          <circle cx="7" cy="12" r="1" />
          <circle cx="7" cy="16" r="1" />
        </svg><span>Prod</span></button>
    </div>

    <div class="extension-title">Latest Player Sync</div>

    <span id="statusDot" class="dot" aria-label="Senkronizasyon durumu"></span>
  </nav>

  <main class="app-shell">
    <div id="records" hidden></div>

    <aside class="control-column">
      <header>
        <section class="controls">
          <div class="setting">
            <select id="waitMs" aria-label="Sayfalar arası bekleme">
              <option value="3000">3 saniye</option>
              <option value="5000" selected>5 saniye</option>
              <option value="10000">10 saniye</option>
              <option value="20000">20 saniye</option>
            </select>
          </div>
          <div class="actions sync-actions">
            <button id="clear" class="link"><svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13M10 11v5M14 11v5" />
              </svg><span>Clear</span></button>
            <button id="start" class="primary"><svg class="button-icon play-icon" viewBox="0 0 24 24"
                aria-hidden="true">
                <path d="m8 5 11 7-11 7V5Z" />
              </svg><span id="startLabel">Start</span></button>
            <button id="stop" class="danger" hidden><svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="6" y="6" width="12" height="12" rx="2" />
              </svg><span>Finish</span></button>
          </div>
          <p id="error" class="error" hidden></p>
        </section>
      </header>

      <section class="monitor">
        <div class="monitor-head">
          <div><span class="eyebrow">CANLI DURUM</span><strong id="status">Hazır</strong><small id="currentClub">İş bekleniyor</small></div>
        </div>
        <div class="progress"><span id="progressBar"></span></div>
        <div class="countdown-box">
          <span class="countdown-icon"><svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9" />
              <path d="M12 7v5l3 2" />
            </svg></span>
          <div><small>SONRAKİ ADIM / TEKRAR</small><b id="countdown">Bekliyor</b></div>
        </div>
        <div class="stats sync-stats">
          <div><b id="insertedCount">0</b><small>YENİ KAYIT</small></div>
          <div><b id="updatedCount">0</b><small>GÜNCELLENEN</small></div>
        </div>
        <div class="logs">
          <div class="logs-head"><span id="logTitle" class="eyebrow">CANLI LOG</span><small id="logCount">bekliyor</small></div>
          <div id="errorLogs" class="error-logs" hidden></div>
          <div id="logs" class="logs-list">
            <div class="logs-empty">Henüz request gönderilmedi.</div>
          </div>
        </div>
      </section>
    </aside>
  </main>
  <script src="../../config/api.js"></script>
  <script src="actions/futbinLatestCoinCards.js"></script>
  <script src="popup.js"></script>
</body>

</html>
