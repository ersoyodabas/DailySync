<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SBC WebAppSync</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <span id="statusDot" class="dot"></span>
    <div>
      <h1>Web App Sync</h1>
      <small>Production · .env saat ayarları</small>
    </div>
  </header>

  <main>
    <section class="status-card">
      <span>DURUM</span>
      <strong id="status">Yükleniyor…</strong>
      <small id="nextCheck">Kontrol hazırlanıyor</small>
    </section>

    <section id="progressSection" hidden>
      <div class="section-title"><span>SYNC ADIMLARI</span><small id="progressSummary">0 / 9</small></div>
      <div id="stepProgress" class="step-progress"></div>
    </section>

    <section>
      <div class="section-title"><span>GÜNLÜK ÇALIŞMALAR</span><small id="logCount">0 kayıt</small></div>
      <div id="dailyLogs" class="daily-logs"><p>Henüz başarı kaydı yok.</p></div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
