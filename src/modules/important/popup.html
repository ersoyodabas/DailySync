<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Important Players Sync</title><link rel="stylesheet" href="popup.css"><style>.error-table{min-width:1100px}.error-table th{white-space:nowrap}.error-table td:last-child{min-width:320px}.error-table td:nth-child(n+3):nth-child(-n+9){color:#d8b4fe;white-space:nowrap}.top-actions{display:flex;align-items:center;gap:6px}.icon-button{display:inline-flex;flex:0 0 32px;width:32px;height:32px;padding:7px;align-items:center;justify-content:center;background:#202832;color:#aab6c4}.icon-button svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8}.icon-button.danger{background:#3a2025;color:#ff929b}.icon-button.danger svg{fill:currentColor;stroke:none}.icon-button[hidden]{display:none}.controls{justify-content:flex-end}.controls #start{flex:0 0 auto;min-width:100px;padding:7px 18px}.section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}.section-title b{padding:4px 8px;border-radius:999px;background:#30231d;color:#ffbf7a;font-size:10px}</style></head>
<body><div class="topbar"><div class="environment-switch" role="group" aria-label="Backend ortamı"><button class="environment active" type="button" data-api-env="local">Local</button><button class="environment" type="button" data-api-env="production">Prod</button></div><div class="top-actions"><button id="network" title="API Network Monitor">Network</button><button id="clear" class="icon-button" title="Kayıtları temizle" aria-label="Kayıtları temizle"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 7h12m-10 0 1 13h6l1-13m-6 0V4h4v3"/></svg></button><button id="stop" class="icon-button danger" title="Finish" aria-label="Finish" hidden><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2"/></svg></button></div></div><header><div><small>FUTBIN FILTERED PLAYERS</small><h1>Important Players Sync</h1></div><i id="dot"></i></header>
<main><section class="controls"><button id="start">Start</button></section>
<section><small>CANLI DURUM</small><div class="run-banner"><div><span>TUR</span><strong id="round">0</strong></div><div><span>SONRAKİ TURA KALAN</span><strong id="countdown">—</strong></div></div><h2 id="status">Hazır</h2><div class="progress"><span id="bar"></span></div><div class="stats">
<div><b id="pages">0 / 0</b><small>PAGE</small></div><div><b id="parsed">0</b><small>PARSED</small></div><div><b id="mapped">0</b><small>MAPPED</small></div><div><b id="saved">0</b><small>SAVED</small></div><div><b id="skipped">0</b><small>SKIP</small></div></div>
<p id="results">Insert 0 · Update 0</p><p id="next">Sonraki çalışma: —</p></section><section><small>ÇALIŞMA LOGU</small><div id="logs" class="log-list"><div class="log-line log-empty">Henüz log yok.</div></div></section><section><div class="section-title"><small>HATALAR</small><b id="error-count">0 kayıt</b></div><div id="errors" class="error-table-wrap"><div class="log-line log-empty">Hata yok.</div></div></section></main><script src="../../config/api.js"></script><script src="popup.js"></script></body></html>
